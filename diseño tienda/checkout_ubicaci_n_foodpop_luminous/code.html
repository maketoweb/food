<!-- Hidden Pickup Content (Toggled via JS) -->
<script>
        function toggleMode(mode) {
            const btnDelivery = document.getElementById('btn-delivery');
            const btnPickup = document.getElementById('btn-pickup');
            
            if (mode === 'delivery') {
                btnDelivery.classList.add('bg-surface-container-lowest', 'text-primary', 'shadow-sm');
                btnDelivery.classList.remove('text-on-surface-variant');
                btnPickup.classList.remove('bg-surface-container-lowest', 'text-primary', 'shadow-sm');
                btnPickup.classList.add('text-on-surface-variant');
            } else {
                btnPickup.classList.add('bg-surface-container-lowest', 'text-primary', 'shadow-sm');
                btnPickup.classList.remove('text-on-surface-variant');
                btnDelivery.classList.remove('bg-surface-container-lowest', 'text-primary', 'shadow-sm');
                btnDelivery.classList.add('text-on-surface-variant');
            }
        }

        // Lightweight atmospheric effect: gentle hover tracking on the map
        const mapContainer = document.querySelector('section');
        mapContainer.addEventListener('mousemove', (e) => {
            const { left, top, width, height } = mapContainer.getBoundingClientRect();
            const x = (e.clientX - left) / width;
            const y = (e.clientY - top) / height;
            
            const overlay = mapContainer.querySelector('.map-gradient-overlay');
            overlay.style.background = `radial-gradient(circle at ${x * 100}% ${y * 100}%, rgba(255, 92, 0, 0.03) 0%, rgba(255,255,255,0) 50%, rgba(255,255,255,1) 95%)`;
        });
    </script>
