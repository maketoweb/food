<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Marketo | Supermercado Online y Delivery Express en Valencia</title>
    
    <!-- SEO & AIO Optimization para Supermercado en Valencia, Venezuela -->
    <meta name="description" content="Marketo: Tu supermercado premium en Valencia, Carabobo. Compra víveres, carnes, lácteos y bodegón con delivery express en Naguanagua, San Diego y Valencia Norte. Calidad garantizada." />
    <meta name="keywords" content="supermercado valencia, delivery viveres valencia, mercado a domicilio carabobo, bodegon online valencia, comprar comida valencia, marketo express, naguanagua delivery, san diego delivery" />
    <meta name="author" content="Marketo" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    
    <!-- Geo-Tagging for precise Valencia local search positioning -->
    <meta name="geo.region" content="VE-D" />
    <meta name="geo.placename" content="Valencia, Naguanagua, San Diego, Carabobo, Venezuela" />
    <meta name="geo.position" content="10.198300;-68.004400" />
    <meta name="ICBM" content="10.198300, -68.004400" />

    <!-- Open Graph / Social Media Optimization -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Marketo Supermercado | Víveres y Delicateses a Domicilio" />
    <meta property="og:description" content="Haz tu mercado online en Valencia con delivery inmediato. Carnes premium, quesos madurados y víveres nacionales e importados." />
    <meta property="og:url" content="https://marketo.com.ve" />
    <meta property="og:site_name" content="Marketo" />
    <meta property="og:image" content="https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&q=80&w=1200" />
    <meta property="og:locale" content="es_VE" />

    <!-- Twitter Card Meta -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Marketo: Supermercado Online en Valencia" />
    <meta name="twitter:description" content="Víveres y productos frescos con delivery express en Carabobo. Calidad premium en tu puerta." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&q=80&w=1200" />

    <!-- iOS Native App Emulation and PWA Settings -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Marketo" />
    <meta name="theme-color" content="#ffffff" />

    <!-- CSP: allow Google Fonts + required font formats -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https: wss:; frame-src 'self' https:; media-src 'self' blob: https://assets.mixkit.co; object-src 'none'; base-uri 'self'; form-action 'self' https:;"
    />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&q=80&w=192" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  </head>
  <body class="bg-zinc-100 text-zinc-900 antialiased overflow-x-hidden">
    <!-- Aplicar color y nombre de tienda antes de que React cargue para evitar flash -->
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('trv_config');
          if (saved) {
            var cfg = JSON.parse(saved);
            if (cfg.theme_color) {
              document.body.style.backgroundColor = cfg.theme_color;
              document.querySelector('meta[name="theme-color"]').setAttribute('content', cfg.theme_color);
              document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]').setAttribute('content', 'black-translucent');
            }
            if (cfg.site_nombre) {
              document.title = cfg.site_nombre + ' | Supermercado Online y Delivery Express';
              document.querySelector('meta[name="apple-mobile-web-app-title"]').setAttribute('content', cfg.site_nombre);
              document.querySelector('meta[name="og:site_name"]').setAttribute('content', cfg.site_nombre);
            }
          }
        } catch(e) {}
      })();
    </script>
    <div id="root"></div>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
