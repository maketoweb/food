    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <meta name="keywords" content="restaurante, delivery, hamburguesas, pizzas, pollo, postres, comida rapida, foodpop" />
    <meta name="author" content="FoodPop" />

    <meta property="og:url" content="https://foodpop.com.ve" />

    <meta property="og:locale" content="es_VE" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:description" content="FoodPop: Tu restaurante favorito siempre contigo. Pide ahora." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&q=80&w=1200" />

    <!-- iOS PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FoodPop" />
    <meta name="theme-color" content="#FF2D95" />

    <!-- CSP -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https: wss:; frame-src 'self' https:; media-src 'self' blob: https://assets.mixkit.co; object-src 'none'; base-uri 'self'; form-action 'self' https:;"
    />

    <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&q=80&w=192" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Fredoka:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  </head>
  <body class="bg-zinc-50 text-zinc-900 antialiased overflow-x-hidden">
    <!-- Aplicar color y nombre antes de que React cargue -->
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('trv_config');
          if (saved) {
            var cfg = JSON.parse(saved);
            if (cfg.theme_color) {
              document.body.style.backgroundColor = cfg.theme_color;
              document.querySelector('meta[name="theme-color"]').setAttribute('content', cfg.theme_color);
              document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]').setAttribute('content', 'black-translucent');
            }
            if (cfg.site_nombre) {
              document.title = cfg.site_nombre + ' | Delivery de Comida Premium';
              document.querySelector('meta[name="apple-mobile-web-app-title"]').setAttribute('content', cfg.site_nombre);
              document.querySelector('meta[property="og:site_name"]').setAttribute('content', cfg.site_nombre);
            }
          }
        } catch(e) {}
      })();
    </script>
    <div id="root"></div>
    <!-- Leaflet JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
