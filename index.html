<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>FoodPop | Hamburguesas, Pizzas & Más 🍔</title>
    
    <!-- SEO -->
    <meta name="description" content="FoodPop: Tu restaurante favorito con delivery express. Hamburguesas, pizzas, pollo, postres y más. Pide ahora y recibe en minutos." />
    <meta name="keywords" content="restaurante, delivery, hamburguesas, pizzas, pollo, postres, comida rapida, foodpop" />
    <meta name="author" content="FoodPop" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    
    <!-- Geo-Tagging -->
    <meta name="geo.region" content="VE-D" />
    <meta name="geo.placename" content="Venezuela" />
    <meta name="geo.position" content="10.198300;-68.004400" />
    <meta name="ICBM" content="10.198300, -68.004400" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="FoodPop | Hamburguesas, Pizzas & Más 🍔" />
    <meta property="og:description" content="Pide tu comida favorita con delivery express. Hamburguesas, pizzas, pollo, postres y más." />
    <meta property="og:url" content="https://foodpop.com.ve" />
    <meta property="og:site_name" content="FoodPop" />

    <meta property="og:locale" content="es_VE" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FoodPop: Hamburguesas, Pizzas & Más 🍔" />
    <meta name="twitter:description" content="FoodPop: Tu restaurante favorito siempre contigo. Pide ahora." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&q=80&w=1200" />

    <!-- iOS PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FoodPop" />
    <meta name="theme-color" content="#ff5c00" />

    <!-- CSP -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https: wss:; frame-src 'self' https:; media-src 'self' blob: https://assets.mixkit.co; manifest-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self' https:;"
    />
    <link id="pwa-manifest" rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Google Fonts: Plus Jakarta Sans + Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  </head>
  <body class="bg-[#f9f9fb] text-[#1a1c1d] antialiased overflow-x-hidden">
    <!-- Aplicar color y nombre antes de que React cargue -->
    <script>
      (function() {
        var manifestLink = document.getElementById('pwa-manifest');
        var isAdmin = window.location.pathname.startsWith('/admin');
        if (manifestLink && isAdmin) {
          manifestLink.href = '/manifest-admin.json';
          document.querySelector('meta[name="apple-mobile-web-app-title"]').setAttribute('content', 'FoodPop Admin');
        }
        try {
          var saved = localStorage.getItem('trv_config');
          if (saved) {
            var cfg = JSON.parse(saved);
            if (cfg.theme_color) {
              document.body.style.backgroundColor = cfg.theme_color;
              document.querySelector('meta[name="theme-color"]').setAttribute('content', cfg.theme_color);
              document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]').setAttribute('content', 'black-translucent');
            }
            if (cfg.site_nombre) {
              document.title = cfg.site_nombre + ' | Delivery de Comida Premium';
              document.querySelector('meta[name="apple-mobile-web-app-title"]').setAttribute('content', cfg.site_nombre);
              document.querySelector('meta[property="og:site_name"]').setAttribute('content', cfg.site_nombre);
            }
            if (cfg.pwa_icon_url && manifestLink) {
              fetch(manifestLink.href).then(function(r) { return r.json(); }).then(function(baseManifest) {
                var customIcons = baseManifest.icons.map(function(icon) {
                  var newIcon = Object.assign({}, icon);
                  newIcon.src = cfg.pwa_icon_url;
                  return newIcon;
                });
                baseManifest.icons = customIcons;
                if (cfg.theme_color) {
                  baseManifest.theme_color = cfg.theme_color;
                  baseManifest.background_color = cfg.theme_color;
                }
                if (cfg.site_nombre) {
                  baseManifest.name = cfg.site_nombre;
                  baseManifest.short_name = cfg.site_nombre.substring(0, 12);
                }
                var blob = new Blob([JSON.stringify(baseManifest)], { type: 'application/json' });
                var blobUrl = URL.createObjectURL(blob);
                manifestLink.href = blobUrl;
              }).catch(function() {});
            }
          }
        } catch(e) {}
      })();
    </script>
    <div id="root"></div>
    <!-- Leaflet JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
